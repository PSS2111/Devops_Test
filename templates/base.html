<!DOCTYPE html>
<html>
<head>
    <title>DevOps Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body id="body">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🚀 DevOps Dashboard</span>

    <div>
        <a class="text-white me-3" href="/">Home</a>
        <a class="text-white me-3" href="/about">About</a>
        <a class="text-white me-3" href="/pipeline">Pipeline</a>

        <button onclick="toggleMode()" class="btn btn-sm btn-light">🌙</button>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script>
function toggleMode() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
